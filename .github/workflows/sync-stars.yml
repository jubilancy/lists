name: Sync GitHub Stars to Quartz (Card Layout)
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Updated from v4 to v5 for Node 24 support
        uses: actions/checkout@v5 

      - name: Setup Python
        # Updated from v4 to v6 for Node 24 support
        uses: actions/setup-python@v6 
        with:
          python-version: '3.x'

      - name: Generate Stars Cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import requests
          import os

          token = os.getenv("GITHUB_TOKEN")
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          stars = []
          page = 1

          while True:
              url = f"https://api.github.com/user/starred?page={page}&per_page=100"
              response = requests.get(url, headers=headers)
              data = response.json()
              
              if not data or response.status_code != 200:
                  break
                  
              stars.extend(data)
              page += 1

          content = "---\ntitle: 🌟 My GitHub Stars\n---\n\n"
          content += "A live-syncing gallery of repositories I've starred. Updated daily via GitHub Actions.\n\n"

          for repo in stars:
              name = repo.get('full_name', 'Unknown Repo')
              repo_url = repo.get('html_url', '#')
              site_url = repo.get('homepage')
              desc = repo.get('description') or "No description provided."
              lang = repo.get('language')
              topics = repo.get('topics', [])

              content += f"> [!abstract] [{name}]({repo_url})\n"
              content += f"> {desc}\n"
              
              if site_url:
                  content += f"> * [Visit Project Website]({site_url})\n"
              
              meta_line = []
              if lang:
                  meta_line.append(f"`{lang}`")
              if topics:
                  meta_line.append(" ".join([f"#{t}" for t in topics[:3]]))
              
              if meta_line:
                  content += f"> * {' '.join(meta_line)}\n"
              
              content += "\n"

          os.makedirs('content', exist_ok=True)
          with open('content/stars.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/stars.md
          git commit -m "chore: automated update of stars linkroll cards" || exit 0
          git push
