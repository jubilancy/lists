name: Sync GitHub Stars to Quartz (Card Layout)
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v4
          fetch-depth: 0 # Fetches all history for all branches

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Stars Cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > generate_stars.py
          import requests
          import os

          token = os.getenv("GITHUB_TOKEN")
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
          
          stars = []
          page = 1
          while True:
              url = f"https://api.github.com/user/starred?page={page}&per_page=100"
              response = requests.get(url, headers=headers)
              data = response.json()
              if not data or response.status_code != 200:
                  break
              stars.extend(data)
              page += 1

          content = "---\ntitle: 🌟 My GitHub Stars\n---\n\n"
          for repo in stars:
              name = repo.get('full_name', 'Unknown Repo')
              repo_url = repo.get('html_url', '#')
              site_url = repo.get('homepage')
              desc = repo.get('description') or "No description provided."
              lang = repo.get('language')
              topics = repo.get('topics', [])
              content += f"> [!abstract] [{name}]({repo_url})\n> {desc}\n"
              if site_url: content += f"> * [Visit Project Website]({site_url})\n"
              meta = [f"`{lang}`"] if lang else []
              if topics: meta.append(" ".join([f"#{t}" for t in topics[:3]]))
              if meta: content += f"> * {' '.join(meta)}\n"
              content += "\n"

          os.makedirs('content', exist_ok=True)
          with open('content/stars.md', 'w') as f:
              f.write(content)
          EOF
          python generate_stars.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # DEBUG: Show us if the file actually exists on the runner
          ls -l content/stars.md
          
          git add content/stars.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update stars linkroll"
            git push origin v4
          fi